# Auto-add sub-issues to the same GitHub Project as their parent issue.
#
# Some GitHub Projects have a built-in "Auto-add" workflow that handles this,
# but it is not always enabled or available. This GitHub Action covers that gap.
#
# Usage:
#   Copy this file to your repository at:
#     .github/workflows/auto-add-sub-issues-to-project.yml
#
#   Then set the PROJECT_NUMBER variable below to your GitHub Project number
#   (found in the project URL: https://github.com/orgs/<org>/projects/<number>).

name: Auto-add sub-issues to project

on:
  issues:
    types: [opened]

jobs:
  add-sub-issue-to-project:
    runs-on: ubuntu-latest
    steps:
      - name: Check if issue is a sub-issue and add to parent's project
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;

            // Get the issue with sub-issue info via GraphQL
            const query = `query($owner: String!, $repo: String!, $number: Int!) {
              repository(owner: $owner, name: $repo) {
                issue(number: $number) {
                  id
                  parentIssue {
                    id
                    number
                    projectItems(first: 10) {
                      nodes {
                        project {
                          id
                          title
                        }
                      }
                    }
                  }
                }
              }
            }`;

            const result = await github.graphql(query, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: issue.number,
              headers: {
                'GraphQL-Features': 'sub_issues'
              }
            });

            const parentIssue = result.repository.issue.parentIssue;
            if (!parentIssue) {
              console.log(`Issue #${issue.number} has no parent issue. Skipping.`);
              return;
            }

            console.log(`Issue #${issue.number} is a sub-issue of #${parentIssue.number}`);

            const projectItems = parentIssue.projectItems?.nodes || [];
            if (projectItems.length === 0) {
              console.log(`Parent issue #${parentIssue.number} is not in any project. Skipping.`);
              return;
            }

            const issueId = result.repository.issue.id;

            for (const item of projectItems) {
              const project = item.project;
              console.log(`Adding issue #${issue.number} to project "${project.title}"...`);

              const mutation = `mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: {
                  projectId: $projectId,
                  contentId: $contentId
                }) {
                  item {
                    id
                  }
                }
              }`;

              try {
                await github.graphql(mutation, {
                  projectId: project.id,
                  contentId: issueId
                });
                console.log(`Successfully added to project "${project.title}"`);
              } catch (error) {
                console.error(`Failed to add to project "${project.title}":`, error.message);
              }
            }
